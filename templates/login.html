{% extends 'base.html' %}

{% block title %}Login - Expense Tracker{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
            <h3 class="mt-2">Welcome Back</h3>
            <p class="text-secondary">Sign in to track your expenses</p>
        </div>
        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label for="username" class="form-label text-secondary">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-color"><i class="bi bi-person text-secondary"></i></span>
                    <input type="text" class="form-control form-control-custom border-start-0" id="username" name="username" placeholder="Enter your username" required>
                </div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label text-secondary">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-color"><i class="bi bi-lock text-secondary"></i></span>
                    <input type="password" class="form-control form-control-custom border-start-0" id="password" name="password" placeholder="Enter your password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 py-3 mb-3">
                <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
            </button>
        </form>
        <div class="text-center">
            <p class="text-secondary mb-0">Don't have an account? <a href="{{ url_for('register') }}" class="text-primary fw-semibold text-decoration-none">Register here</a></p>
        </div>
    </div>
</div>
{% endblock %}
