{% extends 'base.html' %}

{% block title %}Register - Expense Tracker{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="text-center mb-4">
            <i class="bi bi-person-plus-fill text-primary" style="font-size: 3rem;"></i>
            <h3 class="mt-2">Create Account</h3>
            <p class="text-secondary">Join us to manage your expenses</p>
        </div>
        <form method="POST" action="{{ url_for('register') }}">
            <div class="mb-3">
                <label for="username" class="form-label text-secondary">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-color"><i class="bi bi-person text-secondary"></i></span>
                    <input type="text" class="form-control form-control-custom border-start-0" id="username" name="username" placeholder="Choose a username" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label text-secondary">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-color"><i class="bi bi-envelope text-secondary"></i></span>
                    <input type="email" class="form-control form-control-custom border-start-0" id="email" name="email" placeholder="name@example.com" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label text-secondary">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-color"><i class="bi bi-lock text-secondary"></i></span>
                    <input type="password" class="form-control form-control-custom border-start-0" id="password" name="password" placeholder="Create a password" required>
                </div>
            </div>
            <div class="mb-4">
                <label for="confirm_password" class="form-label text-secondary">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-color"><i class="bi bi-lock-fill text-secondary"></i></span>
                    <input type="password" class="form-control form-control-custom border-start-0" id="confirm_password" name="confirm_password" placeholder="Repeat your password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 py-3 mb-3">
                <i class="bi bi-check-circle me-1"></i> Register
            </button>
        </form>
        <div class="text-center">
            <p class="text-secondary mb-0">Already have an account? <a href="{{ url_for('login') }}" class="text-primary fw-semibold text-decoration-none">Sign in here</a></p>
        </div>
    </div>
</div>
{% endblock %}
